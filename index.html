<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <header>
        <h1 class="pt-8 text-center text-3xl font-bold sm:text-4xl">
            Weather App
        </h1>
</header>
    <div class="card mx-auto mt-6 w-full max-w-2xl rounded-2xl bg-white p-4 shadow-md sm:p-6">
        <div class="search-container flex items-center gap-2">
            <input class="flex-1 rounded-xl border border-slate-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400" type="text" placeholder="Enter City Name" spellcheck="false" id="place" list="search-history-list">
            <datalist id="search-history-list"></datalist>
            <div id="suggestions" class="suggestions-box"></div>
            <button class="rounded-xl bg-blue-600 px-4 py-2.5 font-semibold text-white hover:bg-blue-700" type="submit" id="submit"> <img  id="look" src="Images/search50px.png" alt="" style="size:5px;"></button>
            <button class="rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-100" type="button" id="current-location">Use My Location</button>
        </div>
        <p id="error-msg" class="mt-3 hidden rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700"></p>
    </div>
    <h3 id="city" class="mx-auto mt-6 w-full max-w-2xl text-2xl font-semibold">City</h3>
    <h4 id="lat" class="mx-auto mt-2 w-full max-w-2xl text-slate-700">lat</h4>
    <h4 id="lon" class="mx-auto mt-1 w-full max-w-2xl text-slate-700">lon</h4>
    <h4 id="temp" class="mx-auto mt-1 w-full max-w-2xl text-slate-700">Temp</h4>
    <h2 class="mx-auto mt-6 w-full max-w-2xl text-xl font-bold">5-Day Forecast</h2>
    <div id="forecast" class="mx-auto mt-4 grid w-full max-w-5xl gap-3 px-2 sm:grid-cols-2 lg:grid-cols-5"></div>
    <script src="script.js"></script>
</body>
</html>
